services:
  # Backend API Service
  - type: web
    name: tecinfo-attendance-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: "7d"
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: tecinfo-attendance-web
    runtime: static
    region: singapore
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://tecinfo-attendance-api.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
