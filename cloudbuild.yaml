# Cloud Build configuration for GCP deployment from GitHub
# This file is used by Cloud Build to automatically deploy on git push

steps:
  # Build and deploy backend
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'attendance-backend'
      - '--source=./backend'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    id: 'deploy-backend'

  # Build and deploy frontend
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'attendance-frontend'
      - '--source=./frontend'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
    id: 'deploy-frontend'
    waitFor: ['deploy-backend']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
